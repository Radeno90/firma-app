<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Firma">
<meta name="theme-color" content="#0f0f0f">
<link rel="manifest" href="manifest.json">
<title>Firma – CEO Simulácia</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f0f;
  --surface: #1a1a1a;
  --surface2: #242424;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.15);
  --text: #f0ede8;
  --text2: #888;
  --text3: #555;
  --accent: #c8b89a;
  --accent2: #8a7560;
  --green: #4a9e6e;
  --green-bg: rgba(74,158,110,0.12);
  --font-display: 'Syne', sans-serif;
  --font-body: 'DM Sans', sans-serif;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html, body {
  height: 100%; width: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  overflow: hidden;
  user-select: none;
}

/* SCREENS */
.screen { position: absolute; inset: 0; display: none; flex-direction: column; }
.screen.active { display: flex; }

/* ═══ SETUP SCREEN ═══ */
#screen-setup {
  align-items: center;
  justify-content: center;
  padding: 2rem;
  background: var(--bg);
}
.setup-logo {
  font-family: var(--font-display);
  font-size: 3rem;
  font-weight: 800;
  letter-spacing: -0.03em;
  color: var(--text);
  margin-bottom: 0.25rem;
}
.setup-sub {
  font-size: 0.85rem;
  color: var(--text3);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 3rem;
}
.setup-card {
  background: var(--surface);
  border: 0.5px solid var(--border2);
  border-radius: 20px;
  padding: 1.75rem;
  width: 100%;
  max-width: 380px;
}
.setup-card label {
  display: block;
  font-size: 0.75rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text2);
  margin-bottom: 0.5rem;
}
.setup-card input {
  width: 100%;
  background: var(--bg);
  border: 0.5px solid var(--border2);
  border-radius: 10px;
  padding: 0.85rem 1rem;
  color: var(--text);
  font-family: var(--font-body);
  font-size: 0.9rem;
  outline: none;
  margin-bottom: 1rem;
}
.setup-card input:focus { border-color: var(--accent); }
.setup-card input::placeholder { color: var(--text3); }
.btn-start {
  width: 100%;
  background: var(--accent);
  color: #0f0f0f;
  border: none;
  border-radius: 10px;
  padding: 0.9rem;
  font-family: var(--font-display);
  font-size: 1rem;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: 0.02em;
  transition: opacity 0.2s;
}
.btn-start:active { opacity: 0.8; }
.setup-note {
  font-size: 0.75rem;
  color: var(--text3);
  text-align: center;
  margin-top: 1rem;
  line-height: 1.6;
}

/* ═══ BOARDROOM SCREEN ═══ */
#screen-boardroom {
  background: var(--bg);
}

.top-bar {
  padding: calc(var(--safe-top) + 0.75rem) 1.25rem 0.75rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 0.5px solid var(--border);
  flex-shrink: 0;
}
.top-bar-title {
  font-family: var(--font-display);
  font-size: 1.1rem;
  font-weight: 700;
  letter-spacing: -0.01em;
}
.top-bar-sub { font-size: 0.75rem; color: var(--text3); }
.company-name { font-size: 0.8rem; color: var(--accent); font-weight: 500; }

.room-wrap {
  flex: 1;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

.table {
  width: min(280px, 72vw);
  height: min(160px, 41vw);
  background: var(--surface);
  border-radius: 50%;
  border: 0.5px solid var(--border2);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 2px;
  position: relative;
  z-index: 1;
}
.table-label {
  font-size: 0.65rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text3);
}
.table-date {
  font-size: 0.7rem;
  color: var(--text3);
}

/* SEATS around the table */
.seat {
  position: absolute;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 5px;
  cursor: pointer;
  z-index: 2;
}
.seat-avatar {
  width: min(54px, 13.5vw);
  height: min(54px, 13.5vw);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-display);
  font-size: min(13px, 3.2vw);
  font-weight: 700;
  border: 1.5px solid transparent;
  transition: transform 0.2s, border-color 0.2s;
  position: relative;
}
.seat:active .seat-avatar { transform: scale(0.92); }
.seat-online::after {
  content: '';
  position: absolute;
  bottom: 1px; right: 1px;
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--green);
  border: 2px solid var(--bg);
}
.seat-name {
  font-size: min(11px, 2.8vw);
  font-weight: 500;
  color: var(--text);
  text-align: center;
  white-space: nowrap;
}
.seat-role {
  font-size: min(10px, 2.5vw);
  color: var(--text3);
  text-align: center;
  white-space: nowrap;
  margin-top: -3px;
}

/* CEO seat - bottom center */
.seat-ceo .seat-avatar {
  width: min(62px, 15.5vw);
  height: min(62px, 15.5vw);
  background: #1e1a14;
  border-color: var(--accent);
  font-size: min(14px, 3.5vw);
  color: var(--accent);
}

/* Add button */
.seat-add .seat-avatar {
  background: var(--surface);
  border: 1.5px dashed var(--border2);
  color: var(--text3);
  font-size: 22px;
  font-weight: 300;
}
.seat-add:active .seat-avatar {
  background: var(--surface2);
  border-color: var(--accent2);
  color: var(--accent);
}

/* BOTTOM NAV */
.bottom-nav {
  padding: 0.75rem 1.25rem calc(var(--safe-bottom) + 0.75rem);
  border-top: 0.5px solid var(--border);
  display: flex;
  gap: 8px;
  flex-shrink: 0;
}
.nav-btn {
  flex: 1;
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: 12px;
  padding: 0.65rem 0.5rem;
  color: var(--text2);
  font-family: var(--font-body);
  font-size: 0.75rem;
  cursor: pointer;
  text-align: center;
  transition: background 0.15s, color 0.15s;
}
.nav-btn:active { background: var(--surface2); color: var(--text); }
.nav-btn .nav-icon { font-size: 1.1rem; display: block; margin-bottom: 2px; }

/* ═══ CHAT SCREEN ═══ */
#screen-chat {
  background: var(--bg);
}
.chat-header {
  padding: calc(var(--safe-top) + 0.75rem) 1.25rem 0.75rem;
  display: flex;
  align-items: center;
  gap: 12px;
  border-bottom: 0.5px solid var(--border);
  flex-shrink: 0;
}
.chat-back {
  background: none;
  border: none;
  color: var(--text2);
  font-size: 1.4rem;
  cursor: pointer;
  padding: 4px;
  line-height: 1;
}
.chat-av {
  width: 38px; height: 38px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-display);
  font-size: 12px; font-weight: 700;
  flex-shrink: 0;
  position: relative;
}
.chat-av::after {
  content: '';
  position: absolute; bottom: 0; right: 0;
  width: 10px; height: 10px; border-radius: 50%;
  background: var(--green);
  border: 2px solid var(--bg);
}
.chat-info .chat-name { font-family: var(--font-display); font-size: 1rem; font-weight: 700; }
.chat-info .chat-role { font-size: 0.75rem; color: var(--text3); }

.messages {
  flex: 1;
  overflow-y: auto;
  padding: 1rem 1rem;
  display: flex;
  flex-direction: column;
  gap: 12px;
  -webkit-overflow-scrolling: touch;
}
.msg { display: flex; gap: 8px; align-items: flex-end; }
.msg.user { flex-direction: row-reverse; }
.msg-av-sm {
  width: 28px; height: 28px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-display);
  font-size: 10px; font-weight: 700;
  flex-shrink: 0;
}
.bubble {
  max-width: 78%;
  padding: 10px 14px;
  font-size: 0.9rem;
  line-height: 1.55;
  border-radius: 18px;
  white-space: pre-wrap;
  word-break: break-word;
}
.msg.agent .bubble {
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-bottom-left-radius: 4px;
  color: var(--text);
}
.msg.user .bubble {
  background: var(--accent);
  color: #0f0f0f;
  border-bottom-right-radius: 4px;
}
.thinking-bubble {
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-bottom-left-radius: 4px;
  padding: 12px 16px;
  border-radius: 18px;
  display: flex; gap: 5px; align-items: center;
}
.t-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--accent2);
  animation: tdot 1.2s infinite;
}
.t-dot:nth-child(2) { animation-delay: 0.2s; }
.t-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes tdot { 0%,60%,100%{transform:translateY(0);opacity:0.5} 30%{transform:translateY(-5px);opacity:1} }

.chat-input-area {
  padding: 0.75rem 1rem calc(var(--safe-bottom) + 0.75rem);
  border-top: 0.5px solid var(--border);
  display: flex;
  gap: 8px;
  align-items: flex-end;
  flex-shrink: 0;
  background: var(--bg);
}
.chat-input-area textarea {
  flex: 1;
  background: var(--surface);
  border: 0.5px solid var(--border2);
  border-radius: 22px;
  padding: 10px 16px;
  color: var(--text);
  font-family: var(--font-body);
  font-size: 0.9rem;
  line-height: 1.4;
  resize: none;
  outline: none;
  min-height: 42px;
  max-height: 120px;
  -webkit-overflow-scrolling: touch;
}
.chat-input-area textarea::placeholder { color: var(--text3); }
.chat-send {
  width: 42px; height: 42px;
  border-radius: 50%;
  background: var(--accent);
  border: none;
  color: #0f0f0f;
  font-size: 1.1rem;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: opacity 0.2s;
}
.chat-send:active { opacity: 0.7; }
.chat-send:disabled { background: var(--surface2); color: var(--text3); }

/* AGENT COLORS */
.color-teal { background: #0d3d2e; color: #4ecb9a; }
.color-amber { background: #3d2a0d; color: #e8a84a; }
.color-coral { background: #3d150d; color: #e86b4a; }
.color-pink { background: #3d0d25; color: #e84a8a; }
.color-blue { background: #0d1f3d; color: #4a8ae8; }

/* SKILL PILLS */
.skill-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
.skill-pill {
  font-size: 0.7rem;
  padding: 3px 9px;
  border-radius: 20px;
  background: var(--surface2);
  border: 0.5px solid var(--border2);
  color: var(--text2);
}

/* FADE IN */
@keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
.msg { animation: fadeUp 0.2s ease; }

/* SCROLLBAR */
::-webkit-scrollbar { width: 0; }
</style>
</head>
<body>

<!-- ═══ SETUP SCREEN ═══ -->
<div class="screen active" id="screen-setup">
  <div class="setup-logo">Firma</div>
  <div class="setup-sub">CEO Simulácia</div>
  <div class="setup-card">
    <label>Názov tvojej firmy</label>
    <input type="text" id="company-name" placeholder="napr. Acme s.r.o." autocomplete="off">
    <label>Anthropic API kľúč</label>
    <input type="password" id="api-key" placeholder="sk-ant-..." autocomplete="off">
    <button class="btn-start" onclick="startGame()">Vstúpiť do boardroomu →</button>
    <p class="setup-note">API kľúč je uložený len lokálne v tvojom zariadení a nikam sa neodosiela.</p>
  </div>
</div>

<!-- ═══ BOARDROOM SCREEN ═══ -->
<div class="screen" id="screen-boardroom">
  <div class="top-bar">
    <div>
      <div class="top-bar-title">Boardroom</div>
      <div class="company-name" id="display-company">Firma</div>
    </div>
    <div style="text-align:right">
      <div class="top-bar-sub" id="display-date"></div>
      <div style="font-size:0.7rem;color:var(--green);margin-top:2px">● Online</div>
    </div>
  </div>

  <div class="room-wrap" id="room-wrap">
    <div class="table">
      <div class="table-label">Rokovací stôl</div>
      <div class="table-date" id="table-date"></div>
    </div>

    <!-- CEO - bottom center -->
    <div class="seat seat-ceo" id="seat-ceo">
      <div class="seat-avatar" id="ceo-avatar">CEO</div>
      <div class="seat-name" id="ceo-name">Ty</div>
      <div class="seat-role">CEO</div>
    </div>

    <!-- Seats placed via JS -->
  </div>

  <div class="bottom-nav">
    <button class="nav-btn" onclick="openSettings()">
      <span class="nav-icon">⚙</span>Nastavenia
    </button>
    <button class="nav-btn" onclick="addAgent()">
      <span class="nav-icon">＋</span>Nový člen
    </button>
    <button class="nav-btn" onclick="showInfo()">
      <span class="nav-icon">📋</span>Prehľad
    </button>
  </div>
</div>

<!-- ═══ CHAT SCREEN ═══ -->
<div class="screen" id="screen-chat">
  <div class="chat-header">
    <button class="chat-back" onclick="backToBoard()">‹</button>
    <div class="chat-av" id="chat-av"></div>
    <div class="chat-info">
      <div class="chat-name" id="chat-name"></div>
      <div class="chat-role" id="chat-role"></div>
    </div>
  </div>
  <div class="messages" id="messages"></div>
  <div class="chat-input-area">
    <textarea id="chat-input" placeholder="Napíšte správu..." rows="1"
      onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="chat-send" id="send-btn" onclick="sendMessage()">↑</button>
  </div>
</div>

<script>
const AGENTS = [
  {
    id: 'martina',
    name: 'Martina',
    role: 'Asistentka',
    initials: 'MA',
    color: 'color-teal',
    skills: ['Email', 'Kalendár', 'Drive', 'Organizácia'],
    system: `Si Martina, osobná asistentka CEO firmy. Komunikuješ VÝHRADNE po slovensky. Si profesionálna, stručná a proaktívna. Máš prístup k emailu, kalendáru a firemným dokumentom. Keď dostaneš úlohu, splníš ju priamo a konkrétne. Vždy navrhni ďalší krok. Nikdy nehovor že si AI.`
  },
  {
    id: 'juraj',
    name: 'Juraj',
    role: 'Účtovník',
    initials: 'JU',
    color: 'color-amber',
    skills: ['Faktúry', 'Výkazy', 'DPH', 'Reporting'],
    system: `Si Juraj, hlavný účtovník firmy. Komunikuješ VÝHRADNE po slovensky. Si presný, spoľahlivý a orientovaný na detaily. Pomáhaš s faktúrami, účtovnými výkazmi, DPH a finančným reportingom. Používaš odborné účtovné pojmy ale vysvetľuješ ich zrozumiteľne. Nikdy nehovor že si AI.`
  },
  {
    id: 'peter',
    name: 'Peter',
    role: 'Sales Manager',
    initials: 'PE',
    color: 'color-coral',
    skills: ['CRM', 'Ponuky', 'Klienti', 'Pipeline'],
    system: `Si Peter, Sales Manager firmy. Komunikuješ VÝHRADNE po slovensky. Si energický, presvedčivý a zameraný na výsledky. Pomáhaš s obchodnými ponukami, správou klientov, CRM a predajným pipelineom. Vždy hľadáš príležitosti na rast. Nikdy nehovor že si AI.`
  },
  {
    id: 'zuzana',
    name: 'Zuzana',
    role: 'HR Manažér',
    initials: 'ZU',
    color: 'color-pink',
    skills: ['Nábor', 'Zmluvy', 'Onboarding', 'Hodnotenie'],
    system: `Si Zuzana, HR Manažérka firmy. Komunikuješ VÝHRADNE po slovensky. Si empatická, organizovaná a zameraná na ľudí. Pomáhaš s náborom, pracovnými zmluvami, onboardingom a hodnotením zamestnancov. Dbáš na zákonnosť a firemkú kultúru. Nikdy nehovor že si AI.`
  },
  {
    id: 'lucia',
    name: 'Lucia',
    role: 'Marketing',
    initials: 'LU',
    color: 'color-blue',
    skills: ['Obsah', 'Social', 'Kampane', 'Analytics'],
    system: `Si Lucia, Marketing Manažérka firmy. Komunikuješ VÝHRADNE po slovensky. Si kreatívna, analytická a trendy. Pomáhaš s obsahovým marketingom, social media, kampaňami a analyticsou. Vždy myslíš na cieľovú skupinu a brand. Nikdy nehovor že si AI.`
  }
];

let state = {
  apiKey: '',
  companyName: '',
  currentAgent: null,
  histories: {}
};

AGENTS.forEach(a => { state.histories[a.id] = []; });

function startGame() {
  const key = document.getElementById('api-key').value.trim();
  const name = document.getElementById('company-name').value.trim() || 'Moja Firma';
  if (!key || !key.startsWith('sk-ant')) {
    alert('Prosím zadaj platný Anthropic API kľúč (začína sk-ant-)');
    return;
  }
  state.apiKey = key;
  state.companyName = name;
  localStorage.setItem('firma_key', key);
  localStorage.setItem('firma_company', name);
  initBoardroom();
  showScreen('boardroom');
}

function initBoardroom() {
  document.getElementById('display-company').textContent = state.companyName;
  const now = new Date();
  const dateStr = now.toLocaleDateString('sk-SK', { weekday: 'short', day: 'numeric', month: 'short' });
  document.getElementById('display-date').textContent = dateStr;
  document.getElementById('table-date').textContent = dateStr;

  const wrap = document.getElementById('room-wrap');
  document.querySelectorAll('.seat:not(.seat-ceo)').forEach(e => e.remove());

  const W = wrap.offsetWidth || 360;
  const H = wrap.offsetHeight || 400;
  const cx = W / 2, cy = H / 2;
  const rx = Math.min(W * 0.38, 155);
  const ry = Math.min(H * 0.36, 145);

  const angles = [-90, -30, 30, 150, 210];

  AGENTS.forEach((agent, i) => {
    const angle = (angles[i] * Math.PI) / 180;
    const x = cx + rx * Math.cos(angle);
    const y = cy + ry * Math.sin(angle);

    const seat = document.createElement('div');
    seat.className = 'seat';
    seat.style.left = x + 'px';
    seat.style.top = y + 'px';
    seat.style.transform = 'translate(-50%, -50%)';
    seat.onclick = () => openChat(agent.id);
    seat.innerHTML = `
      <div class="seat-avatar seat-online ${agent.color}">${agent.initials}</div>
      <div class="seat-name">${agent.name}</div>
      <div class="seat-role">${agent.role}</div>
    `;
    wrap.appendChild(seat);
  });

  const ceoSeat = document.getElementById('seat-ceo');
  ceoSeat.style.left = cx + 'px';
  ceoSeat.style.top = (cy + ry * 0.82) + 'px';
  ceoSeat.style.transform = 'translate(-50%, -50%)';
}

function openChat(agentId) {
  const agent = AGENTS.find(a => a.id === agentId);
  if (!agent) return;
  state.currentAgent = agent;

  document.getElementById('chat-av').className = `chat-av ${agent.color}`;
  document.getElementById('chat-av').textContent = agent.initials;
  document.getElementById('chat-name').textContent = agent.name;
  document.getElementById('chat-role').textContent = agent.role;

  const msgBox = document.getElementById('messages');
  msgBox.innerHTML = '';

  if (state.histories[agentId].length === 0) {
    const greetings = {
      martina: 'Dobrý deň! Som tu a pripravená pomôcť. Čo potrebujete?',
      juraj: 'Dobrý deň. Juraj Novák, účtovník. Čím vám môžem poslúžiť?',
      peter: 'Ahoj šéfe! Peter na drôte. Máme nejakú obchodnú príležitosť?',
      zuzana: 'Dobrý deň. Zuzana Kováčová, HR. Ako vám môžem pomôcť?',
      lucia: 'Čau! Lucia z marketingu. Čo chystáme?'
    };
    addBubble('agent', greetings[agentId], agent);
  } else {
    state.histories[agentId].forEach(msg => {
      if (msg.role === 'user') addBubble('user', msg.content, agent);
      else addBubble('agent', msg.content, agent);
    });
  }

  showScreen('chat');
  setTimeout(() => {
    const box = document.getElementById('messages');
    box.scrollTop = box.scrollHeight;
  }, 50);
}

function addBubble(role, text, agent) {
  const box = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = 'msg ' + role;
  const av = document.createElement('div');
  av.className = 'msg-av-sm';
  if (role === 'agent') {
    av.className += ` ${agent.color}`;
    av.textContent = agent.initials;
  } else {
    av.style.background = '#1e1a14';
    av.style.color = '#c8b89a';
    av.style.border = '1px solid #c8b89a44';
    av.textContent = 'CEO';
  }
  const b = document.createElement('div');
  b.className = 'bubble';
  b.textContent = text;
  row.appendChild(av);
  row.appendChild(b);
  box.appendChild(row);
  box.scrollTop = box.scrollHeight;
}

function showThinking(agent) {
  const box = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = 'msg agent';
  row.id = 'thinking-row';
  const av = document.createElement('div');
  av.className = `msg-av-sm ${agent.color}`;
  av.textContent = agent.initials;
  const t = document.createElement('div');
  t.className = 'thinking-bubble';
  t.innerHTML = '<div class="t-dot"></div><div class="t-dot"></div><div class="t-dot"></div>';
  row.appendChild(av); row.appendChild(t);
  box.appendChild(row);
  box.scrollTop = box.scrollHeight;
}

function removeThinking() {
  const t = document.getElementById('thinking-row');
  if (t) t.remove();
}

let busy = false;

async function sendMessage() {
  if (busy) return;
  const agent = state.currentAgent;
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  input.style.height = 'auto';
  document.getElementById('send-btn').disabled = true;
  busy = true;

  addBubble('user', text, agent);
  state.histories[agent.id].push({ role: 'user', content: text });
  showThinking(agent);

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': state.apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-5',
        max_tokens: 1000,
        system: agent.system,
        messages: state.histories[agent.id]
      })
    });

    const data = await res.json();
    removeThinking();

    if (data.error) throw new Error("API: " + data.error.message + " (" + data.error.type + ")");

    const reply = (data.content || []).filter(b => b.type === 'text').map(b => b.text).join('\n').trim();
    if (reply) {
      addBubble('agent', reply, agent);
      state.histories[agent.id].push({ role: 'assistant', content: reply });
    }
  } catch (err) {
    removeThinking();
    let errMsg = 'Technická chyba: ' + err.message;
    if (err.message && err.message.includes('Failed to fetch')) {
      errMsg = 'Chyba pripojenia. Skontrolujte API kľúč v Nastaveniach (⚙).';
    }
    addBubble('agent', errMsg, agent);
    console.error('API error:', err);
  }

  busy = false;
  document.getElementById('send-btn').disabled = false;
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function backToBoard() { showScreen('boardroom'); }

function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
}

function openSettings() {
  const newKey = prompt('Anthropic API kľúč:', state.apiKey);
  if (newKey !== null) { state.apiKey = newKey; localStorage.setItem('firma_key', newKey); }
}

function addAgent() {
  alert('Pridávanie nových členov – v ďalšej verzii! 🚀');
}

function showInfo() {
  const lines = AGENTS.map(a => `${a.name} (${a.role}): ${state.histories[a.id].length / 2 | 0} konverzácií`).join('\n');
  alert(`Tím – ${state.companyName}\n\n${lines}`);
}

// Load saved credentials
window.addEventListener('load', () => {
  const saved = localStorage.getItem('firma_key');
  const savedCompany = localStorage.getItem('firma_company');
  if (saved) document.getElementById('api-key').value = saved;
  if (savedCompany) document.getElementById('company-name').value = savedCompany;

  if (saved && savedCompany) {
    state.apiKey = saved;
    state.companyName = savedCompany;
    initBoardroom();
    showScreen('boardroom');
  }

  window.addEventListener('resize', () => {
    if (document.getElementById('screen-boardroom').classList.contains('active')) {
      initBoardroom();
    }
  });
});

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
</script>
