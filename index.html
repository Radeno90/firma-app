<style>
:root {
  --bg: #0f0f0f;
  --surface: #1a1a1a;
  --surface2: #242424;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.15);
  --text: #f0ede8;
  --text2: #888;
  --text3: #555;
  --accent: #c8b89a;
  --accent2: #8a7560;
  --green: #4a9e6e;
  --font-display: 'Syne', sans-serif;
  --font-body: 'DM Sans', sans-serif;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body { height:100%; width:100%; background:var(--bg); color:var(--text); font-family:var(--font-body); overflow:hidden; user-select:none; }
.screen { position:absolute; inset:0; display:none; flex-direction:column; }
.screen.active { display:flex; }

/* SETUP */
#screen-setup { align-items:center; justify-content:center; padding:2rem; }
.setup-logo { font-family:var(--font-display); font-size:3rem; font-weight:800; letter-spacing:-0.03em; margin-bottom:0.25rem; }
.setup-sub { font-size:0.85rem; color:var(--text3); letter-spacing:0.12em; text-transform:uppercase; margin-bottom:2.5rem; }
.setup-card { background:var(--surface); border:0.5px solid var(--border2); border-radius:20px; padding:1.75rem; width:100%; max-width:380px; }
.setup-card label { display:block; font-size:0.75rem; letter-spacing:0.1em; text-transform:uppercase; color:var(--text2); margin-bottom:0.5rem; }
.setup-card input { width:100%; background:var(--bg); border:0.5px solid var(--border2); border-radius:10px; padding:0.85rem 1rem; color:var(--text); font-family:var(--font-body); font-size:0.9rem; outline:none; margin-bottom:1rem; }
.setup-card input:focus { border-color:var(--accent); }
.setup-card input::placeholder { color:var(--text3); }
.btn-start { width:100%; background:var(--accent); color:#0f0f0f; border:none; border-radius:10px; padding:0.9rem; font-family:var(--font-display); font-size:1rem; font-weight:700; cursor:pointer; transition:opacity 0.2s; margin-bottom:0.75rem; }
.btn-start:active { opacity:0.8; }
.btn-google { width:100%; background:var(--surface2); color:var(--text); border:0.5px solid var(--border2); border-radius:10px; padding:0.9rem; font-family:var(--font-body); font-size:0.9rem; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:10px; transition:background 0.2s; }
.btn-google:hover { background:#2a2a2a; }
.google-icon { width:18px; height:18px; }
.setup-note { font-size:0.75rem; color:var(--text3); text-align:center; margin-top:1rem; line-height:1.6; }
.google-status { font-size:0.8rem; text-align:center; margin-top:0.75rem; padding:0.5rem; border-radius:8px; }
.google-status.connected { background:rgba(74,158,110,0.15); color:#4a9e6e; }
.google-status.disconnected { color:var(--text3); }

/* BOARDROOM */
#screen-boardroom { background:var(--bg); }
.top-bar { padding:calc(var(--safe-top) + 0.75rem) 1.25rem 0.75rem; display:flex; align-items:center; justify-content:space-between; border-bottom:0.5px solid var(--border); flex-shrink:0; }
.top-bar-title { font-family:var(--font-display); font-size:1.1rem; font-weight:700; }
.company-name { font-size:0.8rem; color:var(--accent); font-weight:500; }
.google-badge { font-size:0.7rem; padding:2px 8px; border-radius:20px; background:rgba(74,158,110,0.15); color:#4a9e6e; }
.google-badge.off { background:rgba(255,255,255,0.05); color:var(--text3); }
.room-wrap { flex:1; position:relative; display:flex; align-items:center; justify-content:center; overflow:hidden; }
.table { width:min(280px,72vw); height:min(160px,41vw); background:var(--surface); border-radius:50%; border:0.5px solid var(--border2); display:flex; align-items:center; justify-content:center; flex-direction:column; gap:2px; }
.table-label { font-size:0.65rem; letter-spacing:0.12em; text-transform:uppercase; color:var(--text3); }
.table-date { font-size:0.7rem; color:var(--text3); }
.seat { position:absolute; display:flex; flex-direction:column; align-items:center; gap:5px; cursor:pointer; z-index:2; }
.seat-avatar { width:min(54px,13.5vw); height:min(54px,13.5vw); border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:var(--font-display); font-size:min(13px,3.2vw); font-weight:700; border:1.5px solid transparent; transition:transform 0.2s,border-color 0.2s; position:relative; }
.seat:active .seat-avatar { transform:scale(0.92); }
.seat-online::after { content:''; position:absolute; bottom:1px; right:1px; width:10px; height:10px; border-radius:50%; background:var(--green); border:2px solid var(--bg); }
.seat-name { font-size:min(11px,2.8vw); font-weight:500; color:var(--text); text-align:center; white-space:nowrap; }
.seat-role { font-size:min(10px,2.5vw); color:var(--text3); text-align:center; white-space:nowrap; margin-top:-3px; }
.seat-ceo .seat-avatar { width:min(62px,15.5vw); height:min(62px,15.5vw); background:#1e1a14; border-color:var(--accent); font-size:min(14px,3.5vw); color:var(--accent); }
.bottom-nav { padding:0.75rem 1.25rem calc(var(--safe-bottom) + 0.75rem); border-top:0.5px solid var(--border); display:flex; gap:8px; flex-shrink:0; }
.nav-btn { flex:1; background:var(--surface); border:0.5px solid var(--border); border-radius:12px; padding:0.65rem 0.5rem; color:var(--text2); font-family:var(--font-body); font-size:0.75rem; cursor:pointer; text-align:center; }
.nav-btn:active { background:var(--surface2); color:var(--text); }
.nav-icon { font-size:1.1rem; display:block; margin-bottom:2px; }

/* CHAT */
#screen-chat { background:var(--bg); }
.chat-header { padding:calc(var(--safe-top) + 0.75rem) 1.25rem 0.75rem; display:flex; align-items:center; gap:12px; border-bottom:0.5px solid var(--border); flex-shrink:0; }
.chat-back { background:none; border:none; color:var(--text2); font-size:1.4rem; cursor:pointer; padding:4px; line-height:1; }
.chat-av { width:38px; height:38px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:var(--font-display); font-size:12px; font-weight:700; flex-shrink:0; position:relative; }
.chat-av::after { content:''; position:absolute; bottom:0; right:0; width:10px; height:10px; border-radius:50%; background:var(--green); border:2px solid var(--bg); }
.chat-name { font-family:var(--font-display); font-size:1rem; font-weight:700; }
.chat-role { font-size:0.75rem; color:var(--text3); }
.chat-tools { margin-left:auto; display:flex; gap:6px; }
.tool-btn { background:var(--surface2); border:0.5px solid var(--border2); border-radius:8px; padding:4px 8px; font-size:0.7rem; color:var(--text2); cursor:pointer; white-space:nowrap; }
.tool-btn.active { background:rgba(74,158,110,0.15); color:#4a9e6e; border-color:rgba(74,158,110,0.3); }
.messages { flex:1; overflow-y:auto; padding:1rem; display:flex; flex-direction:column; gap:12px; -webkit-overflow-scrolling:touch; }
.msg { display:flex; gap:8px; align-items:flex-end; animation:fadeUp 0.2s ease; }
.msg.user { flex-direction:row-reverse; }
.msg-av-sm { width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:var(--font-display); font-size:10px; font-weight:700; flex-shrink:0; }
.bubble { max-width:78%; padding:10px 14px; font-size:0.9rem; line-height:1.55; border-radius:18px; white-space:pre-wrap; word-break:break-word; }
.msg.agent .bubble { background:var(--surface); border:0.5px solid var(--border); border-bottom-left-radius:4px; color:var(--text); }
.msg.user .bubble { background:var(--accent); color:#0f0f0f; border-bottom-right-radius:4px; }
.system-msg { font-size:0.75rem; color:var(--text3); text-align:center; padding:4px 12px; background:var(--surface); border-radius:20px; align-self:center; border:0.5px solid var(--border); }
.thinking-bubble { background:var(--surface); border:0.5px solid var(--border); border-bottom-left-radius:4px; padding:12px 16px; border-radius:18px; display:flex; gap:5px; align-items:center; }
.t-dot { width:6px; height:6px; border-radius:50%; background:var(--accent2); animation:tdot 1.2s infinite; }
.t-dot:nth-child(2) { animation-delay:0.2s; }
.t-dot:nth-child(3) { animation-delay:0.4s; }
@keyframes tdot { 0%,60%,100%{transform:translateY(0);opacity:0.5} 30%{transform:translateY(-5px);opacity:1} }
.chat-input-area { padding:0.75rem 1rem calc(var(--safe-bottom) + 0.75rem); border-top:0.5px solid var(--border); display:flex; gap:8px; align-items:flex-end; flex-shrink:0; }
.chat-input-area textarea { flex:1; background:var(--surface); border:0.5px solid var(--border2); border-radius:22px; padding:10px 16px; color:var(--text); font-family:var(--font-body); font-size:0.9rem; line-height:1.4; resize:none; outline:none; min-height:42px; max-height:120px; }
.chat-input-area textarea::placeholder { color:var(--text3); }
.chat-send { width:42px; height:42px; border-radius:50%; background:var(--accent); border:none; color:#0f0f0f; font-size:1.1rem; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.chat-send:active { opacity:0.7; }
.chat-send:disabled { background:var(--surface2); color:var(--text3); }
.quick-actions { display:flex; gap:6px; padding:0 1rem 0.5rem; overflow-x:auto; flex-shrink:0; }
.qa-btn { background:var(--surface); border:0.5px solid var(--border2); border-radius:20px; padding:6px 12px; font-size:0.75rem; color:var(--text2); cursor:pointer; white-space:nowrap; font-family:var(--font-body); flex-shrink:0; }
.qa-btn:active { background:var(--surface2); color:var(--text); }

/* COLORS */
.color-teal { background:#0d3d2e; color:#4ecb9a; }
.color-amber { background:#3d2a0d; color:#e8a84a; }
.color-coral { background:#3d150d; color:#e86b4a; }
.color-pink { background:#3d0d25; color:#e84a8a; }
.color-blue { background:#0d1f3d; color:#4a8ae8; }
@keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
::-webkit-scrollbar { width:0; }
</style>
</head>

};
AGENTS.forEach(a => { state.histories[a.id] = []; });

// ── GOOGLE OAUTH ──
let tokenClient;

function initGoogle() {
  if (!window.google) return;
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: SCOPES,
    callback: (resp) => {
      if (resp.error) { alert('Google chyba: ' + resp.error); return; }
      state.googleToken = resp.access_token;
      localStorage.setItem('firma_gtoken', resp.access_token);
      updateGoogleUI(true);
    }
  });
}

function connectGoogle() {
  if (!window.google) { alert('Načítavam Google... skúste znova.'); return; }
  if (!tokenClient) initGoogle();
  tokenClient.requestAccessToken();
}

function updateGoogleUI(connected) {
  const status = document.getElementById('google-status');
  const badge = document.getElementById('google-badge');
  const btnG = document.getElementById('btn-google');
  if (connected) {
    if (status) { status.textContent = '✓ Google účet prepojený'; status.className = 'google-status connected'; }
    if (badge) { badge.textContent = '● Google'; badge.className = 'google-badge'; }
    if (btnG) btnG.textContent = '✓ Google pripojený';
  } else {
    if (badge) { badge.textContent = 'Google offline'; badge.className = 'google-badge off'; }
  }
}

async function fetchGmail(maxResults = 10, query = 'in:inbox newer_than:7d') {
  if (!state.googleToken) return null;
  try {
    const r = await fetch(`https://gmail.googleapis.com/gmail/v1/users/me/messages?maxResults=${maxResults}&q=${encodeURIComponent(query)}`, {
      headers: { Authorization: 'Bearer ' + state.googleToken }
    });
    const data = await r.json();
    if (!data.messages) return [];
    const details = await Promise.all(data.messages.slice(0,8).map(async m => {
      const d = await fetch(`https://gmail.googleapis.com/gmail/v1/users/me/messages/${m.id}?format=full`, {
        headers: { Authorization: 'Bearer ' + state.googleToken }
      });
      return d.json();
    }));
    return details.map(m => {
      const h = m.payload?.headers || [];
      const get = name => h.find(x=>x.name===name)?.value || '';
      const body = extractBody(m.payload);
      return { id: m.id, subject: get('Subject'), from: get('From'), date: get('Date'), snippet: m.snippet, body: body };
    });
  } catch(e) { return null; }
}

function decodeBase64(data) {
  try {
    const b64 = data.replace(/-/g,'+').replace(/_/g,'/');
    const decoded = atob(b64);
    return decodeURIComponent(escape(decoded));
  } catch(e) {
    try { return atob(data.replace(/-/g,'+').replace(/_/g,'/')); } catch(e2) { return ''; }
  }
}

function extractBody(payload) {
  if (!payload) return '';
  // direct body
  if (payload.body?.data) return decodeBase64(payload.body.data);
  if (!payload.parts) return '';
  // prefer text/plain
  for (const part of payload.parts) {
    if (part.mimeType === 'text/plain' && part.body?.data) return decodeBase64(part.body.data);
  }
  // fallback to text/html stripped
  for (const part of payload.parts) {
    if (part.mimeType === 'text/html' && part.body?.data) {
      const html = decodeBase64(part.body.data);
      return html.replace(/<[^>]*>/g,' ').replace(/&nbsp;/g,' ').replace(/&amp;/g,'&').replace(/\s+/g,' ').trim();
    }
  }
  // recurse into multipart
  for (const part of payload.parts) {
    if (part.mimeType?.startsWith('multipart/')) {
      const nested = extractBody(part);
      if (nested) return nested;
    }
  }
  return '';
}

async function fetchCalendar(days = 7) {
  if (!state.googleToken) return null;
  try {
    const now = new Date().toISOString();
    const end = new Date(Date.now() + days*86400000).toISOString();
    const r = await fetch(`https://www.googleapis.com/calendar/v3/calendars/primary/events?timeMin=${now}&timeMax=${end}&singleEvents=true&orderBy=startTime&maxResults=15`, {
      headers: { Authorization: 'Bearer ' + state.googleToken }
    });
    const data = await r.json();
    return (data.items || []).map(e => ({
      title: e.summary || '(bez názvu)',
      start: e.start?.dateTime || e.start?.date,
      end: e.end?.dateTime || e.end?.date,
      location: e.location || ''
    }));
  } catch(e) { return null; }
}

// ── GAME ──
function startGame() {
  const key = document.getElementById('api-key').value.trim();
  const name = document.getElementById('company-name').value.trim() || 'Moja Firma';
  if (!key || !key.startsWith('sk-ant')) { alert('Zadaj platný Anthropic API kľúč (sk-ant-...)'); return; }
  state.apiKey = key;
  state.companyName = name;
  localStorage.setItem('firma_key', key);
  localStorage.setItem('firma_company', name);
  initBoardroom();
  showScreen('boardroom');
}

function initBoardroom() {
  document.getElementById('display-company').textContent = state.companyName;
  const dateStr = new Date().toLocaleDateString('sk-SK', {weekday:'short',day:'numeric',month:'short'});
  document.getElementById('display-date').textContent = dateStr;
  document.getElementById('table-date').textContent = dateStr;
  updateGoogleUI(!!state.googleToken);

  const wrap = document.getElementById('room-wrap');
  document.querySelectorAll('.seat:not(.seat-ceo)').forEach(e=>e.remove());
  const W = wrap.offsetWidth||360, H = wrap.offsetHeight||400;
  const cx=W/2, cy=H/2, rx=Math.min(W*0.38,155), ry=Math.min(H*0.36,145);
  const angles = [-90,-30,30,150,210];
  AGENTS.forEach((agent,i) => {
    const angle = angles[i]*Math.PI/180;
    const seat = document.createElement('div');
    seat.className = 'seat';
    seat.style.cssText = `left:${cx+rx*Math.cos(angle)}px;top:${cy+ry*Math.sin(angle)}px;transform:translate(-50%,-50%)`;
    seat.onclick = () => openChat(agent.id);
    seat.innerHTML = `<div class="seat-avatar seat-online ${agent.color}">${agent.initials}</div><div class="seat-name">${agent.name}</div><div class="seat-role">${agent.role}</div>`;
    wrap.appendChild(seat);
  });
  const ceo = document.getElementById('seat-ceo');
  ceo.style.cssText = `left:${cx}px;top:${cy+ry*0.82}px;transform:translate(-50%,-50%)`;
}

function openChat(agentId) {
  const agent = AGENTS.find(a=>a.id===agentId);
  if (!agent) return;
  state.currentAgent = agent;
  document.getElementById('chat-av').className = `chat-av ${agent.color}`;
  document.getElementById('chat-av').textContent = agent.initials;
  document.getElementById('chat-name').textContent = agent.name;
  document.getElementById('chat-role').textContent = agent.role;

  // quick actions
  const qa = document.getElementById('quick-actions');
  qa.innerHTML = (agent.quickActions||[]).map(a=>`<button class="qa-btn" onclick="quickSend('${a}')">${a}</button>`).join('');

  // tool buttons visible only for martina
  document.getElementById('btn-check-email').style.display = agentId==='martina'?'':'none';
  document.getElementById('btn-check-cal').style.display = agentId==='martina'?'':'none';

  const box = document.getElementById('messages');
  box.innerHTML = '';
  if (!state.histories[agentId].length) {
    const greet = {martina:'Dobrý deň! Som tu a pripravená. Chcete aby som skontrolovala emaily alebo kalendár?',juraj:'Dobrý deň. Juraj, účtovník. Čím môžem poslúžiť?',peter:'Ahoj šéfe! Čo chystáme?',zuzana:'Dobrý deň. Zuzana, HR. Ako pomôžem?',lucia:'Čau! Lucia z marketingu. Čo robíme?'};
    addBubble('agent', greet[agentId]||'Dobrý deň!', agent);
  } else {
    state.histories[agentId].forEach(m => addBubble(m.role==='user'?'user':'agent', m.content, agent));
  }
  showScreen('chat');
  setTimeout(()=>{ document.getElementById('messages').scrollTop=99999; },50);
}

async function quickAction(type) {
  const agent = state.currentAgent;
  if (!state.googleToken) {
    addBubble('agent','Šéfe, nemám prístup ku Google. Prosím prepojte Google účet v nastaveniach.', agent);
    return;
  }
  if (type==='email') {
    addSystemMsg('Načítavam emaily...');
    const [inbox, booking, megaub, hauzi] = await Promise.all([
      fetchGmail(8, 'in:inbox newer_than:7d'),
      fetchGmail(8, 'from:booking.com newer_than:30d'),
      fetchGmail(8, 'from:megaubytovanie.sk newer_than:90d'),
      fetchGmail(8, 'from:hauzi.sk newer_than:90d')
    ]);
    const all = [...(inbox||[]), ...(booking||[]), ...(megaub||[]), ...(hauzi||[])];
    const unique = all.filter((e,i,a) => a.findIndex(x=>x.id===e.id)===i);
    if (!unique.length) { addBubble('agent','Žiadne emaily nenájdené alebo token expiroval – skúste prepojiť Google znova.', agent); return; }
    const summary = unique.map(e=>{
      const bodyText = e.body ? e.body.replace(/<[^>]*>/g,'').replace(/\s+/g,' ').trim().substring(0,2000) : e.snippet;
      return `Od: ${e.from}\nPredmet: ${e.subject}\nDátum: ${e.date}\nObsah:\n${bodyText}`;
    }).join('\n\n═══════════════\n\n');
    const prompt = `Toto sú moje emaily z portálov a inboxu:\n\n${summary}\n\nDôležité: emaily z megaubytovanie.sk a hauzi.sk obsahujú PLNÝ TEXT rezervácie vrátane dátumov a počtu osôb. Preštuduj každý email a:\n1. Pre každý DOPYT alebo REZERVÁCIU s dátumami: okamžite vypočítaj cenu podľa cenníka a priprav kompletný vyplnený email hosťovi\n2. Pre správy od existujúcich hostí: zhrň čo chcú\n3. Ostatné: ignoruj\nNEPYTAJ SA na ďalšie info ak máš dátumy a počet osôb v texte emailu.`;
    await sendWithContext(prompt, agent);
  } else if (type==='calendar') {
    addSystemMsg('Načítavam kalendár...');
    const events = await fetchCalendar(14);
    if (!events) { addBubble('agent','Nepodarilo sa načítať kalendár.', agent); return; }
    const summary = events.length ? events.map(e=>`${e.start}: ${e.title}${e.location?' @ '+e.location:''}`).join('\n') : 'Žiadne udalosti.';
    const prompt = `Toto sú udalosti v mojom kalendári na najbližších 14 dní:\n\n${summary}\n\nAk niekto pýta konkrétny termín, skontroluj či je voľný. Inak mi daj prehľad čo ma čaká.`;
    await sendWithContext(prompt, agent);
  }
}

function quickSend(text) {
  document.getElementById('chat-input').value = text;
  sendMessage();
}

async function checkEmails() { openChat('martina'); setTimeout(()=>quickAction('email'),300); }
async function checkCalendar() { openChat('martina'); setTimeout(()=>quickAction('calendar'),300); }

function addBubble(role, text, agent) {
  const box = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = 'msg ' + role;
  const av = document.createElement('div');
  av.className = 'msg-av-sm';
  if (role==='agent') { av.className+=` ${agent.color}`; av.textContent=agent.initials; }
  else { av.style.cssText='background:#1e1a14;color:#c8b89a;border:1px solid #c8b89a44'; av.textContent='CEO'; }
  const b = document.createElement('div');
  b.className = 'bubble'; b.textContent = text;
  row.appendChild(av); row.appendChild(b);
  box.appendChild(row);
  box.scrollTop = box.scrollHeight;
}

function addSystemMsg(text) {
  const box = document.getElementById('messages');
  const d = document.createElement('div');
  d.className = 'system-msg'; d.textContent = text;
  box.appendChild(d); box.scrollTop = box.scrollHeight;
}

function showThinking(agent) {
  const box = document.getElementById('messages');
  const row = document.createElement('div');
  row.className='msg agent'; row.id='thinking-row';
  const av = document.createElement('div');
  av.className=`msg-av-sm ${agent.color}`; av.textContent=agent.initials;
  const t = document.createElement('div');
  t.className='thinking-bubble';
  t.innerHTML='<div class="t-dot"></div><div class="t-dot"></div><div class="t-dot"></div>';
  row.appendChild(av); row.appendChild(t);
  box.appendChild(row); box.scrollTop=box.scrollHeight;
}
function removeThinking() { const t=document.getElementById('thinking-row'); if(t)t.remove(); }

let busy = false;

async function sendWithContext(userText, agent) {
  busy = true;
  document.getElementById('send-btn').disabled = true;
  addBubble('user', userText, agent);
  state.histories[agent.id].push({role:'user', content:userText});
  showThinking(agent);
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':state.apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body: JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:1500,system:agent.system,messages:state.histories[agent.id]})
    });
    const data = await res.json();
    removeThinking();
    if (data.error) throw new Error(data.error.message);
    const reply = (data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('\n').trim();
    if (reply) { addBubble('agent',reply,agent); state.histories[agent.id].push({role:'assistant',content:reply}); }
  } catch(e) {
    removeThinking();
    addBubble('agent','Technická chyba: '+e.message, agent);
  }
  busy=false;
  document.getElementById('send-btn').disabled=false;
}

async function sendMessage() {
  if (busy) return;
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text) return;
  input.value=''; input.style.height='auto';
  await sendWithContext(text, state.currentAgent);
}

function handleKey(e) { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();} }
function autoResize(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,120)+'px'; }
function backToBoard() { showScreen('boardroom'); }
function showScreen(name) { document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById('screen-'+name).classList.add('active'); }

function openSettings() {
  const choice = prompt('Nastavenia:\n1 - Zmeniť API kľúč\n2 - Odpojiť Google\n3 - Odhlásiť sa (reset)\n\nZadaj číslo:');
  if (choice==='1') {
    const newKey = prompt('Anthropic API kľúč:', state.apiKey);
    if (newKey!==null) { state.apiKey=newKey; localStorage.setItem('firma_key',newKey); alert('API kľúč uložený.'); }
  } else if (choice==='2') {
    state.googleToken=null;
    localStorage.removeItem('firma_gtoken');
    if(window.google) google.accounts.oauth2.revoke(state.googleToken, ()=>{});
    updateGoogleUI(false);
    alert('Google odpojený.');
  } else if (choice==='3') {
    if (confirm('Naozaj sa chcete odhlásiť? Všetky konverzácie sa vymažú.')) {
      localStorage.clear();
      location.reload();
    }
  }
}

window.addEventListener('load', () => {
  const key=localStorage.getItem('firma_key');
  const co=localStorage.getItem('firma_company');
  const gt=localStorage.getItem('firma_gtoken');
  if(key) document.getElementById('api-key').value=key;
  if(co) document.getElementById('company-name').value=co;
  if(gt) { state.googleToken=gt; updateGoogleUI(true); }

  // init google after GSI loads
  const tryInit = setInterval(()=>{ if(window.google){initGoogle();clearInterval(tryInit);} },200);
  setTimeout(()=>clearInterval(tryInit),5000);

  if(key&&co) { state.apiKey=key; state.companyName=co; initBoardroom(); showScreen('boardroom'); }
  window.addEventListener('resize',()=>{ if(document.getElementById('screen-boardroom').classList.contains('active')) initBoardroom(); });
});

if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
